services:
  backend:
    build:
      context: ./Backend
    container_name: jobsprint-backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    container_name: jobsprint-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped